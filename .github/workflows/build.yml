name: Build VCV Rack Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build for Mac Intel
    runs-on: macos-13
    
    steps:
      - uses: actions/checkout@v4

      - name: Download VCV Rack SDK
        run: |
          wget -O sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.6.0-mac-x64.zip"
          unzip -q -o sdk.zip
          mv Rack-SDK* Rack-SDK

      - name: Compile Plugin
        run: |
          export RACK_DIR=$PWD/Rack-SDK
          make clean
          make dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeNeiroi-Mac-Plugin
          path: dist/*.vcvplugin
