name: Build VCV Rack Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build for Mac Intel
    # Принудительно просим Intel-сервер (macOS 13 работает на x64)
    runs-on: macos-13
    
    steps:
    - uses: actions/checkout@v4

    # Качаем строгую, проверенную версию SDK именно для архитектуры x64
    - name: Download VCV Rack SDK
      run: |
        curl -L -o sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.4.0-mac-x64.zip"
        unzip sdk.zip

    # Запускаем компиляцию
    - name: Compile Plugin
      run: |
        export RACK_DIR=$PWD/Rack-SDK
        make clean
        make dist

    # Отдаем готовый архив
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FreeNeiroi-Mac-Plugin
        path: dist/*.vcvplugin
