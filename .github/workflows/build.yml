name: Build VCV Rack Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build for Mac Intel
    runs-on: macos-12
    
    steps:
    - uses: actions/checkout@v4

    - name: Download VCV Rack SDK
      run: |
        curl --fail -L -o sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.4.0-mac-x64%2Barm64.zip"
        
        # Распаковываем тихо и перезаписываем без вопросов (-q -o)
        unzip -q -o sdk.zip
        
        # Находим папку и переименовываем
        mv Rack-SDK* Rack-SDK

    - name: Compile Plugin
      run: |
        export RACK_DIR=$PWD/Rack-SDK
        make clean
        make dist

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Neiroi-Mac-Plugin
        path: dist/*.vcvplugin
