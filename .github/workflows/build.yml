name: Build VCV Rack Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build for Mac
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    # Качаем SDK через надежный wget с правильной веб-кодировкой плюса (%2B)
    - name: Download VCV Rack SDK
      run: |
        wget "https://vcvrack.com/downloads/Rack-SDK-2.4.0-mac-x64%2Barm64.zip" -O sdk.zip
        unzip sdk.zip

    # Компилируем код
    - name: Compile Plugin
      run: |
        export RACK_DIR=$PWD/Rack-SDK
        make clean
        make dist

    # Забираем готовенькое
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Neiroi-Mac-Plugin
        path: dist/*.vcvplugin
