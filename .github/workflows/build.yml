name: Build VCV Rack Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build for Mac Intel
    # Используем самую стабильную версию серверов Mac
    runs-on: macos-12
    
    steps:
    - uses: actions/checkout@v4

    # Качаем базовый SDK 2.0.0 (ссылка без спецсимволов, работает всегда)
    - name: Download VCV Rack SDK
      run: |
        curl -L -o sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.0.0-mac.zip"
        unzip sdk.zip
        # Переименовываем папку для порядка
        mv Rack-SDK* Rack-SDK

    # Компилируем код
    - name: Compile Plugin
      run: |
        export RACK_DIR=$PWD/Rack-SDK
        make clean
        make dist

    # Забираем готовенькое
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Neiroi-Mac-Plugin
        path: dist/*.vcvplugin
