name: Build VCV Rack Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build for Mac
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install zstd
      run: brew install zstd
    - name: Download VCV Rack SDK
      run: |
        curl -o sdk.zip https://vcvrack.com/downloads/Rack-SDK-2.4.0-mac-x64+arm64.zip
        unzip sdk.zip

    - name: Compile Plugin
      run: |
        export RACK_DIR=$PWD/Rack-SDK
        make dist

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Neiroi-Mac-Plugin
        path: dist/*.vcvplugin
