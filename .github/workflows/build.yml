name: Build VCV Rack Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build for Mac
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    # Качаем актуальный SDK (строго для архитектуры x64)
    - name: Download VCV Rack SDK
      run: |
        wget "https://vcvrack.com/downloads/Rack-SDK-latest-mac-x64.zip" -O sdk.zip
        unzip sdk.zip

    # Находим распакованную папку (как бы она ни называлась) и компилируем
    - name: Compile Plugin
      run: |
        export RACK_DIR=$PWD/Rack-SDK
        make clean
        make dist

    # Загружаем готовый плагин
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FreeNeiroi-Mac-Plugin
        path: dist/*.vcvplugin
